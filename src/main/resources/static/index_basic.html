<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BGLOG</title>
  <style>
    /* === tokens / theme === */
    :root {
      --bg: #0b0d12;
      --card: #141824;
      --text: #e8ecf3;
      --muted: #9aa4b2;
      --line: #273044;
      --accent: #5dd0ff;
      --bad: #ff5d5d;
    }

    /* === reset / base === */
    * {
      box-sizing: border-box
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--card)
    }

    th,
    td {
      padding: 10px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-size: 13px
    }

    th {
      color: var(--muted);
      font-weight: 700
    }

    tr:last-child td {
      border-bottom: none
    }

    /* === layout === */
    .container {
      width: 100%;
      max-width: 1240px;
      min-width: 510px;
      margin: 0 auto;
      padding: 0 20px 72px;
    }

    .content {
      margin-top: 18px;
    }

    .grid {
      display: grid;
      margin-top: 20px;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .section {
      margin-top: 28px;
    }

    .section h2 {
      font-size: 16px;
      margin: 0 0 14px 0;
      margin-bottom: 12px;
    }

    .spacer {
      flex: 1
    }

    /* === common ui === */
    .btn {
      height: 34px;
      padding: 0 10px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #0f1320;
      color: var(--text);
      cursor: pointer;
    }

    .btn:hover {
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.08);
    }

    /* ✅ 어디서든 .btn-primary가 "선택됨"처럼 보이게 (리더보드 토글 포함) */
    .btn.btn-primary {
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      font-weight: 900;
    }

    .primary {
      height: 40px;
      padding: 0 14px;
      border-radius: 10px;
      cursor: pointer;
      border: 1px solid #2b3855;
      background: linear-gradient(180deg, #1b2336, #141a2a);
      color: var(--text);
    }

    .primary:hover {
      border-color: var(--accent)
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      padding-top: 14px;
    }

    .card-title {
      margin-bottom: 12px;
    }

    .empty {
      padding: 24px;
      border: 1px dashed var(--line);
      border-radius: 14px;
      color: var(--muted);
      background: rgba(20, 24, 36, .35);
    }

    .muted {
      color: var(--muted)
    }

    .nowrap {
      white-space: nowrap
    }

    .table-scroll {
      max-height: 360px;
      overflow: auto;
      border-radius: 12px;
    }

    /* 02. Header */
    /* === navigation === */
    .topbar {
      z-index: 10;
      background: rgba(11, 13, 18, .9);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 14px 16px;
      max-width: 1240px;
      min-width: 700px;
      margin: 0 auto;
    }

    .brand-btn {
      background: transparent;
      border: none;
      color: inherit;
      font: inherit;
      font-weight: 900;
      padding: 6px 10px;
      border-radius: 10px;
      cursor: pointer;
    }

    .brand-btn:hover {
      background: rgba(255, 255, 255, .06);
    }

    .tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .tab {
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }

    .tab.active {
      border-color: var(--accent);
      color: var(--text);
    }

    .tab.disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    .rightbox {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .current-user {
      color: rgba(255, 255, 255, .92);
      font-weight: 900;
      font-size: 16px;
      margin-right: 12px;
    }

    /* 플레이어 1차 탭 카드와 2차 탭 간격 */
    .player-tabs-card {
      margin-bottom: 22px;
    }

    /* 2차/3차 서브탭 바 */
    .subtab-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }

    /* 3차 탭은 2차보다 조금 더 안쪽/조금 더 작게 */
    .subtab-bar.level-3 {
      margin-top: 16px;
      margin-bottom: 18px;
      padding-left: 4px;
    }

    .subtab-bar .tab {
      padding: 8px 14px;
    }

    /* 2차 탭은 약간 더 존재감 */
    .subtab-bar.level-2 .tab {
      border-radius: 999px;
    }

    /* 3차 탭은 살짝 더 얇게 */
    .subtab-bar.level-3 .tab {
      padding: 7px 12px;
      font-size: 13px;
      opacity: .95;
    }


    /* ===== Search ===== */
    .search-panel {
      margin-top: 18px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
    }

    .search-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-end;
    }

    .search-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .pillbar {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .pill {
      border: 1px dashed var(--line);
      color: var(--muted);
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 12px;
    }

    .hint {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5
    }

    .error {
      margin-top: 10px;
      color: var(--bad);
      font-size: 13px;
      white-space: pre-wrap
    }



    /* ===== dashboard ===== */
    .placement-wrap {
      display: grid;
      grid-template-columns: minmax(0, 440px) minmax(0, 1fr);
      gap: 18px;
      align-items: stretch;
    }

    .placement-chart {
      min-width: 0;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .placement-left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
      min-height: 100%;
    }

    .placement-metrics {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: stretch;
      justify-content: center;
      width: 100%;
      margin-bottom: 16px;
    }

    .placement-left .placements {
      display: grid;
      grid-template-columns: repeat(10, 36px);
      gap: 10px;
      justify-content: center;
    }

    .placement-chart {
      min-width: 0;
      flex: 1;
    }

    .metric {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 72px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--card);
    }

    .brand {
      font-weight: 900;
      letter-spacing: .3px;
    }

    .k {
      color: var(--muted);
      font-size: 12px
    }

    .v {
      font-size: 22px;
      font-weight: 900;
      margin-top: 6px
    }

    .s {
      color: var(--muted);
      font-size: 12px;
      margin-top: 6px
    }



    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #0f1320;
      font-size: 13px;
    }

    label {
      font-size: 12px;
      color: var(--muted)
    }

    input,
    select {
      height: 40px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #0f1320;
      color: var(--text);
      padding: 0 12px;
      outline: none;
    }

    input {
      width: 300px
    }

    select {
      width: 130px
    }


    .metric .k {
      color: var(--muted);
      font-size: 12px;
    }

    .metric .v {
      font-weight: 900;
      font-size: 18px;
    }

    .tile {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 14px;
      border: 1px solid var(--line);
      position: relative;
      cursor: default;
    }

    .tile.win {
      background: #ff4d4d22;
      border-color: #ff4d4d;
      color: #ffb3b3;
    }

    .tile.top10 {
      background: #2b7cff22;
      border-color: #2b7cff;
      color: #b9d6ff;
    }

    .tile.other {
      background: #ffffff12;
      border-color: #ffffff22;
      color: #c7cbd3;
    }

    .insight-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .insight-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
    }

    .insight-card .label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .insight-card .title {
      font-size: 20px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .insight-card .desc {
      color: var(--text);
      font-size: 13px;
      line-height: 1.55;
    }

    .tooltip {
      position: absolute;
      left: 50%;
      top: -10px;
      transform: translate(-50%, -100%);
      background: #0f1320;
      border: 1px solid var(--line);
      padding: 12px 12px 11px;
      border-radius: 14px;
      width: 260px;
      color: var(--text);
      font-size: 11px;
      display: none;
      box-shadow: 0 10px 28px rgba(0, 0, 0, .42);
      pointer-events: none;
      z-index: 20;
    }

    .tile:hover .tooltip {
      display: block;
    }

    .tooltip-head {
      margin-bottom: 8px;
    }

    .tooltip-title {
      font-weight: 900;
      font-size: 13px;
      line-height: 1.2;
    }

    .tooltip-sub {
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.3;
    }

    .tooltip-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      margin-bottom: 9px;
    }

    .tooltip-stat {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255, 255, 255, .03);
      padding: 7px 7px 6px;
      min-width: 0;
    }

    .tooltip-stat .k {
      color: var(--muted);
      font-size: 10px;
      margin-bottom: 3px;
      line-height: 1.1;
    }

    .tooltip-stat .v {
      margin-top: 0;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.2;
      word-break: keep-all;
    }

    .tooltip-meta {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .tooltip-line {
      display: grid;
      grid-template-columns: 30px 1fr;
      align-items: start;
      column-gap: 8px;
      font-size: 11px;
      line-height: 1.4;
    }

    .tooltip-line .label {
      color: var(--muted);
      font-weight: 700;
    }

    .tooltip-line .value {
      min-width: 0;
      word-break: break-word;
      white-space: normal;
    }

    .tooltip-line.team .value {
      padding-left: 0;
    }

    @media (max-width: 1080px) {
      .placement-wrap {
        grid-template-columns: 1fr;
      }

      .insight-grid {
        grid-template-columns: 1fr;
      }
    }

    /* === Match Tab UI === */
    .match-header-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .player-name {
      font-size: 24px;
      font-weight: 900;
      color: rgba(255, 255, 255, .92);
    }

    .period-bar {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin: 6px 0 12px;
    }

    .stats-grid {
      display: grid;
      gap: 12px;
    }

    @media (min-width: 1280px) {
      .stats-grid.top {
        grid-template-columns: repeat(2, 1fr);
      }

      .stats-grid.bottom {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 1279px) and (min-width: 785px) {
      .stats-grid.top {
        grid-template-columns: 1fr;
      }

      .stats-grid.bottom {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 784px) {

      .stats-grid.top,
      .stats-grid.bottom {
        grid-template-columns: 1fr;
      }
    }

    .stat-card {
      background: #0f1a2b;
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: 16px;
      padding: 14px;
    }

    .stat-card h3 {
      margin: 0 0 10px;
      font-size: 16px;
    }

    .stat-metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .metric {
      background: rgba(255, 255, 255, .04);
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: 14px;
      padding: 10px 10px;
      min-height: 58px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .metric .k {
      font-size: 12px;
      color: rgba(255, 255, 255, .65);
    }

    .metric .v {
      font-size: 16px;
      font-weight: 800;
      margin-top: 4px;
    }

    .match-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .match-item {
      height: 110px;
      display: flex;
      align-items: center;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, .08);
      background: #0f1a2b;
      padding: clamp(12px, 2vw, 18px);
    }

    .match-item.top10 {
      background: rgba(74, 163, 255, .14);
      border-color: rgba(74, 163, 255, .45);
    }

    .match-item.win {
      background: rgba(255, 90, 90, .14);
      border-color: rgba(255, 90, 90, .45);
    }

    /* 기본: 버튼은 항상 우측 끝, 파티는 남는 공간(1fr) 먹기 */
    .match-rowgrid {
      display: grid;
      width: 100%;
      align-items: center;
      column-gap: 14px;

      grid-template-columns:
        150px 110px 110px 100px 80px 100px 100px 1fr max-content;
    }

    /* Part4: 버튼은 우측 끝 */
    .col-detail {
      display: flex;
      justify-self: end;
      align-items: center;
      text-align: right;
    }

    /* 각 col 내부도 세로 중앙 */
    .match-rowgrid>div {
      min-width: 0;
      /* 추가 */
      display: flex;
      flex-direction: column;
    }

    /* 버튼 */
    .btn-detail {
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 8px;
      white-space: nowrap;
    }

    .col-party {
      text-align: left;
    }

    @media (max-width: 1280px) {
      .col-survival {
        display: none !important;
      }

      .match-rowgrid {
        grid-template-columns:
          150px 110px 110px 100px 80px 100px 1fr max-content;
      }
    }

    @media (max-width: 1050px) {
      .col-map {
        display: none !important;
      }

      .match-rowgrid {
        grid-template-columns:
          150px 110px 110px 80px 100px 1fr max-content;
      }
    }


    @media (max-width: 930px) {
      .col-mode {
        display: none !important;
      }

      .match-rowgrid {
        grid-template-columns:
          150px 110px 80px 100px 1fr max-content;
      }
    }

    @media (max-width: 800px) {
      .col-party {
        display: none !important;
      }

      .match-rowgrid {
        grid-template-columns:
          150px 110px 80px 1fr max-content;
      }
    }

    @media (max-width: 600px) {
      .match-rowgrid {
        grid-template-columns:
          105px 77px 56px 1fr max-content;
      }
    }

    .mini-label {
      font-size: clamp(11px, 1vw, 13px);
      color: rgba(255, 255, 255, .65);
    }

    .mini-value {
      font-size: clamp(13px, 1.2vw, 15px);
      font-weight: 800;
      margin-top: 2px;
    }

    /* Ranked Leaderboard*/
    /* === ranked tier pill === */
    .tier-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .tier-badge {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, .14);
      background: rgba(255, 255, 255, .06);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 12px;
      color: rgba(255, 255, 255, .9);
    }

    .tier-line1 {
      font-size: 14px;
      font-weight: 900;
    }

    .tier-line2 {
      font-size: 12px;
      color: rgba(255, 255, 255, .65);
      margin-top: 2px;
    }

    .rank-grid {
      display: grid;
      gap: 12px;
    }

    @media (min-width: 900px) {
      .rank-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    /* ===== Ranked UI ===== */
    .ranked-wrap {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .ranked-card {
      background: #0f1a2b;
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: 16px;
      padding: 14px;
    }

    .ranked-title {
      font-size: 16px;
      font-weight: 900;
    }

    .ranked-mini {
      color: rgba(255, 255, 255, .65);
      font-size: 13px;
      white-space: nowrap;
    }

    .ranked-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .tier-row {
      display: flex;
      align-items: center;
      justify-content: center;
      /* 핵심 */
      gap: 14px;
      margin-bottom: 12px;
      text-align: center;
    }

    .tier-main {
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: flex-start;
      /* ← 기본은 좌측 */
    }

    .tier-row.center .tier-main {
      align-items: center;
    }

    .tier-icon {
      width: 72px;
      height: 72px;
      border: none;
      background: transparent;
      border-radius: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .tier-icon img {
      width: 72px;
      height: 72px;
      object-fit: contain;
      display: block;
    }

    .tier-line {
      font-size: 15px;
      font-weight: 900;
    }

    .tier-sub {
      font-size: 12px;
      color: rgba(255, 255, 255, .65);
    }

    .rank-metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    @media (max-width: 840px) {
      .rank-metrics {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .rank-metrics {
        grid-template-columns: 1fr;
      }
    }

    .rank-badge {
      font-weight: 900;
    }

    .rank-top10 {
      color: #4aa3ff;
    }

    .rank-win {
      color: #ff5a5a;
    }

    /* 파티 닉네임: 기본(다른 유저)=mini-label 톤, 나(me)=진한 흰색 */
    .party-link {
      color: rgba(255, 255, 255, .65);
      text-decoration: none;
    }

    .party-link:hover {
      text-decoration: underline;
    }

    .party-link.me {
      font-size: 16px;
      color: rgba(255, 255, 255, .92);
      font-weight: 900;
    }

    .btn-detail {
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 8px;
      white-space: nowrap;
    }

    /* === 순위표 === */
    .lb-tier {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .lb-tier img {
      width: 22px;
      height: 22px;
      object-fit: contain;
      display: block;
    }

    .lb-winrate {
      min-width: 92px;
    }

    .lb-winrate .rate-text {
      font-weight: 800;
      font-size: 13px;
      line-height: 1.1;
    }

    .lb-winrate .rate-bar {
      margin-top: 6px;
      width: 72px;
      height: 5px;
      border-radius: 999px;

      gap: 6px;

      flex-wrap: wrap;
      margin: 12px 0;

      padding: 8px 12px;

      border-color: rgba(255, 255, 255, 0.9);

    .v-blue {
      color: #4aa3ff;

    .v-red {

    /* === compare === */
    .compare-row {

      gap: 14px;
      margin-top: 10px;

    .map-explorer {

      flex-direction: column;
      gap: 18px;

    .map-card-grid {

    }

    @media (max-width: 980px) {

        grid-template-columns: repeat(2, minmax(0, 1fr));

    .map-card {
      position: relative;
      overflow: hidden;

      opacity: .88;

      inset: 0;
      display: flex;

    .map-stage-card,
    .map-layer-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;

    .map-stage {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 14px;
      overflow: hidden;
      background: #0f1320;
      cursor: grab;
      user-select: none;

      position: absolute;
      inset: 0;
      transform-origin: 0 0;
      will-change: transform;

    .map-zoom-layer img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      pointer-events: none;
    }

    .map-marker-layer {
      position: absolute;
      inset: 0;
    }

    .map-marker {
      position: absolute;
      transform: translate(-50%, -50%);
      width: 13px;
      height: 13px;
      border-radius: 50%;

      z-index: 30;

</head>

      function clearGlobalActiveIfNeeded() {
        [...globalTabsEl.querySelectorAll(".tab")].forEach(t => t.classList.remove("active"));
      }

      function colorClass(value, blueAt, redAt) {
        const v = Number(value || 0);
        if (v >= redAt) return "v-red";
        if (v >= blueAt) return "v-blue";
        return "";
      }

      function getPreviewDirection(x, y) {
        // 우측 끝에 가까우면 왼쪽
        if (x >= 78) return "left";

        // 좌측 끝에 가까우면 오른쪽
        if (x <= 12) return "right";

        // 상단 너무 가까우면 아래
        if (y <= 14) return "bottom";

        // 하단 너무 가까우면 위
        if (y >= 86) return "top";

        // 기본은 오른쪽
        return "right";
      }

      function hasGames(stat) {
        return Number(stat?.games ?? 0) > 0;
      }

      function dashIfNoGames(stat, formatter) {
        if (!hasGames(stat)) return "-";
        return formatter();
      }

      function fmtStatInt(stat, value) {
        return dashIfNoGames(stat, () => String(Number(value ?? 0)));
      }

      function fmtStatNum(stat, value, digits = 1) {
        return dashIfNoGames(stat, () => fmt(Number(value ?? 0), digits));
      }

      function fmtStatPct(stat, value, digits = 1) {
        return dashIfNoGames(stat, () => fmtPct(Number(value ?? 0), digits));
      }

      function fmtStatDuration(stat, value) {
        return dashIfNoGames(stat, () => formatDuration(Number(value ?? 0)));
      }

      function fmtStatDistance(stat, value, digits = 1) {
        return dashIfNoGames(stat, () => `${fmt(Number(value ?? 0), digits)}m`);
      }

      function buildPreviewImageHtml(src, alt) {
        if (!src) {
          return `<div class="map-preview-fallback">미리보기 없음</div>`;
        }

        return `
    <img
      class="map-preview-image"
      src="${escapeHtml(src)}"
      alt="${escapeHtml(alt || "미리보기")}"
      loading="lazy"
    />
  `;
      }

      function metricHtml(label, valueText, cls = "") {
        return `
    <div class="metric">
      <div class="k">${escapeHtml(label)}</div>
      <div class="v ${cls}">${escapeHtml(valueText)}</div>

      function tierIconUrl(tier, subTier) {
        const t = String(tier || "").toLowerCase().trim();
        const s = String(subTier || "").toLowerCase().trim();

        // 파일이 있는 폴더(네가 넣어둔 경로)
        const base = "/assets/tiers/s7";

        // unranked 처리(아이콘 없으면 그냥 텍스트로 처리할거라 빈값 반환해도 됨)
        if (!t) return "";

        // master / survivor 같은 단일 파일
        if (t === "master") return `${base}/rankicon_master.png`;
        if (t === "survivor") return `${base}/rankicon_survivor.png`;

        // crystal: 1~4
        if (t === "crystal") {
          const n = parseInt(s, 10);
          const sn = Number.isFinite(n) ? Math.min(Math.max(n, 1), 4) : 1;
          return `${base}/rankicon_crystal${sn}.png`;
        }

        // bronze/silver/gold/platinum/diamond: 1~5
        const n = parseInt(s, 10);
        const sn = Number.isFinite(n) ? Math.min(Math.max(n, 1), 5) : 1;

        if (["bronze", "silver", "gold", "platinum", "diamond"].includes(t)) {
          return `${base}/rankicon_${t}${sn}.png`;
        }

        // 혹시 다른 티어가 오면 안전하게 빈값
        return "";
      }

      function formatMatchTime(isoString) {
        if (!isoString) return "-";
        try {
          const d = new Date(isoString);
          const yyyy = d.getFullYear();
          const mm = String(d.getMonth() + 1).padStart(2, "0");
          const dd = String(d.getDate()).padStart(2, "0");
          const hh = String(d.getHours()).padStart(2, "0");
          return `${yyyy}년${mm}월${dd}일 ${hh}시`;
        } catch {
          return "-";
        }
      }

      function formatAgo(iso) {
        if (!iso) return "-";
        const d = new Date(iso);
        const t = d.getTime();
        if (Number.isNaN(t)) return String(iso);

        const diffMs = Date.now() - t;
        const diffMin = Math.floor(diffMs / 60000);

        if (diffMin < 60) return `${diffMin}분 전`;
        const diffHr = Math.floor(diffMin / 60);
        if (diffHr < 24) return `${diffHr}시간 전`;
        const diffDay = Math.floor(diffHr / 24);
        return `${diffDay}일 전`;
      }

      const DASHBOARD_LIMIT = 20;

      async function fetchSummary(name, opt = {}) {
        const platform = opt.platform || state.platform || "steam";
        const scope = opt.scope || "RECENT";
        const period = opt.period || "WEEK";
        const limit = opt.limit ?? DASHBOARD_LIMIT;

        let url = `/pubg/summary?platform=${encodeURIComponent(platform)}&name=${encodeURIComponent(name)}&scope=${scope}`;

        if (scope === "RECENT") {
          url += `&period=${encodeURIComponent(period)}&limit=${encodeURIComponent(limit)}`;
        } else if (scope === "SEASON" && opt.seasonId) {
          url += `&seasonId=${encodeURIComponent(opt.seasonId)}`;
        }

        const res = await fetch(url);
        if (res.ok) return await res.json();

        let msg = "";
        try {
          const ct = res.headers.get("content-type") || "";
          if (ct.includes("application/json")) {
            const j = await res.json();
            msg = j?.message || JSON.stringify(j);
          } else {
            msg = await res.text();
          }
        } catch {
          msg = `HTTP ${res.status}`;
        }

        throw new Error(msg || `HTTP ${res.status}`);
      }

        const el = document.querySelector("#currentUserText");
        if (!el) return;
        el.style.display = "none";
        el.textContent = "";
      }

      async function fetchStats(name, period) {
        const platform = state.platform || "steam";
        const url = `/pubg/stats?platform=${encodeURIComponent(platform)}&name=${encodeURIComponent(name)}&period=${encodeURIComponent(period)}`;
        const res = await fetch(url);
        if (res.ok) return await res.json();

        let msg = "";
        try {
          const ct = res.headers.get("content-type") || "";
          if (ct.includes("application/json")) {
            const j = await res.json();
            msg = j?.message || JSON.stringify(j);
          } else {
            msg = await res.text();
          }
        } catch {
          msg = `HTTP ${res.status}`;
        }
        throw new Error(msg || `HTTP ${res.status}`);
      }

      async function fetchRankedCard(name, mode = "squad-fpp") {
        const platform = state.platform || "steam";
        const url = `/pubg/ranked-card?platform=${encodeURIComponent(platform)}&name=${encodeURIComponent(name)}&mode=${encodeURIComponent(mode)}`;

        const res = await fetch(url);

        // ✅ 성공이면 그대로
        if (res.ok) return await res.json();

        // ✅ 실패면 status 포함해서 던지기
        let msg = "";
        try {
          const ct = res.headers.get("content-type") || "";
          if (ct.includes("application/json")) {
            const j = await res.json();
            msg = j?.message || JSON.stringify(j);
          } else {
            msg = await res.text();
          }
        } catch {
          msg = "";
        }

        const err = new Error(msg || `HTTP ${res.status}`);
        err.status = res.status;
        err.url = url;
        throw err;
      }

      async function fetchRankedBoth(name) {
        // ✅ rankedGameModeStats 키에 맞춰 duo/squad 로 호출
        const duoMode = "duo";
        const squadMode = "squad";

        const [duoRes, squadRes] = await Promise.allSettled([
          fetchRankedCard(name, duoMode),
          fetchRankedCard(name, squadMode),
        ]);

        const wrap = (res, mode) => {
          if (res.status === "fulfilled") return res.value;

          const status = res.reason?.status;
          const message = res.reason?.message || String(res.reason || "오류");

          // ✅ 404면 “기록 없음”으로 취급
          if (status === 404) {
            return { unranked: true, message: "이번 시즌 경쟁전 기록이 없습니다.", mode };
          }

          // ✅ 그 외는 조회 실패
          return { error: true, message: `경쟁전 조회 실패 (${status || "?"}): ${message}`, mode };
        };

        return {
          duo: wrap(duoRes, duoMode),
          squad: wrap(squadRes, squadMode),
        };
      }

      async function fetchLeaderboard() {
        const platform = state.lbPlatform || "steam"; // ✅ 여기 중요 (state.platform 아님)
        const mode = "squad-fpp";
        const url = `/pubg/leaderboard?platform=${encodeURIComponent(platform)}&mode=${encodeURIComponent(mode)}`;
        const res = await fetch(url);
        if (res.ok) return await res.json();
        const msg = await res.text().catch(() => `HTTP ${res.status}`);
        throw new Error(msg || `HTTP ${res.status}`);
      }

           onclick="switchDashboardMode('season')">시즌 전체</div>

      <div class="tab ${state.dashboardMode === "compare" ? "active" : ""}"
           onclick="switchDashboardMode('compare')">유저 비교</div>
    </div>
  `;

        if (state.dashboardMode === "recent") {
          return modeTabs + renderRecentDashboard(summary);
        }

        if (state.dashboardMode === "ranked") {
          return modeTabs + renderDashboardRanked();
        }

        if (state.dashboardMode === "season") {
          return modeTabs + renderSeasonDashboard(summary.season);
        }

        if (state.dashboardMode === "compare") {
          return modeTabs + renderCompareDashboard();

      function renderRecentDashboard(summary) {
        const o = summary.overall || {};
        const placements = summary.recentPlacements || [];
        const recentMatches = summary.recentMatches || [];
        const avgPlace = placements.length
          ? (placements.reduce((a, b) => a + b, 0) / placements.length)
          : 0;

        const cards = `
    <div class="grid">
      <div class="card">
        <div class="k">게임 수</div>
        <div class="v">${escapeHtml(o.games ?? summary.matchCount ?? 0)}</div>

      <div class="card">

        <div class="v">${escapeHtml(fmt(avgPlace, 1))}</div>

        <div class="v">${escapeHtml(formatDuration(o.avgSurvival ?? 0))}</div>
      </div>
    </div>
  `;

        const insights = renderInsightSection(summary);
        const placementSection = renderPlacementSection(summary);
        const partySection = renderPartyMiniSection(recentMatches, state.playerName);

        return cards + insights + placementSection + partySection;
      }

      function calcMatchMvpScore(match) {
        return (Number(match?.kills ?? 0) * 2)
          + Number(match?.assists ?? 0)
          + (Number(match?.damage ?? 0) / 200);
      }

      // 인사이트 데이터
      function buildInsightData(summary) {
        const o = summary?.overall || {};
        const matches = summary?.recentMatches || [];
        const seasonOverall =
          summary?.season?.overall ||
          summary?.season?.overallStats ||
          summary?.season?.stats ||
          null;

        const recent10 = matches.slice(0, 20);

        const avg = (arr, getter) => {
          if (!arr.length) return 0;
          return arr.reduce((sum, item) => sum + getter(item), 0) / arr.length;
        };

        const recentDamage = avg(recent10, m => Number(m.damage ?? 0));
        const recentPlace = avg(recent10, m => Number(m.rank ?? 0));

        const seasonDamage = Number(seasonOverall?.avgDamage ?? 0);
        const seasonPlace = Number(
          seasonOverall?.avgRank ??
          seasonOverall?.averageRank ??
          seasonOverall?.avgPlacement ??
          0
        );


        const avgKills = Number(o.avgKills ?? 0);
        const avgDamage = Number(o.avgDamage ?? 0);
        const avgSurvival = Number(o.avgSurvival ?? 0);
        const avgPlace = Number(
          o.avgRank ??
          o.averageRank ??
          o.avgPlacement ??
          (summary?.recentPlacements?.length
            ? summary.recentPlacements.reduce((a, b) => a + b, 0) / summary.recentPlacements.length
            : 0)
        );

        // 1) 플레이 스타일
        let styleTitle = "밸런스형";
        let styleDesc = "전투와 생존 흐름이 비교적 고르게 유지되고 있습니다.";

        if (avgDamage >= 250 && avgSurvival < 300) {
          styleTitle = "대꼴형";
          styleDesc = "평균 딜량이 높고 초반 교전에 적극적으로 관여하는 편입니다.";
        } else if (avgDamage < 100 && avgSurvival >= 600) {
          styleTitle = "존버형";
          styleDesc = "무리한 교전보다 생존과 후반 운영에 강점이 있습니다.";
        } else if (avgDamage < 150 && avgSurvival >= 900) {
          styleTitle = "치킨형";
          styleDesc = "전투보다 순위 방어와 생존 중심 운영이 두드러집니다.";
        } else if (avgDamage >= 150 && avgSurvival >= 600) {
          styleTitle = "밸런스형";
          styleDesc = "전투력과 생존력이 모두 안정적으로 유지되는 편입니다.";
        } else if (avgKills >= 2.0 && avgDamage >= 220) {
          styleTitle = "돌격형";
          styleDesc = "킬 관여도가 높고 압박 플레이를 자주 시도하는 스타일입니다.";
        }

        // 2) 최근 트렌드: 최근 10판 vs 시즌 전체
        let trendTitle = "안정적";
        let trendDesc = "최근 10판 기록이 시즌 전체 흐름과 비슷하게 유지되고 있습니다.";

        const recentSurvival = avg(recent10, m => Number(m.survivalTime ?? 0));
        const seasonSurvival = Number(seasonOverall?.avgSurvival ?? 0);

        const damageDiff = recentDamage - seasonDamage;
        const survivalDiff = recentSurvival - seasonSurvival;

        if (seasonOverall && recent10.length >= 5) {
          const damageImproved = damageDiff >= 50;
          const damageDropped = damageDiff <= -50;

          const survivalImproved = survivalDiff >= 180;   // 3분
          const survivalDropped = survivalDiff <= -180;

          if ((damageImproved || survivalImproved) && !(damageDropped && survivalDropped)) {
            trendTitle = "상승세";
            trendDesc =
              `최근 10판 평균 딜량 ${fmt(recentDamage, 1)} (시즌 ${fmt(seasonDamage, 1)}), ` +
              `평균 생존 ${formatDuration(recentSurvival)} (시즌 ${formatDuration(seasonSurvival)})로 ` +
              `시즌 전체보다 흐름이 좋습니다.`;

          } else if ((damageDropped || survivalDropped) && !(damageImproved && survivalImproved)) {
            trendTitle = "하락세";
            trendDesc =
              `최근 10판 평균 딜량 ${fmt(recentDamage, 1)} (시즌 ${fmt(seasonDamage, 1)}), ` +
              `평균 생존 ${formatDuration(recentSurvival)} (시즌 ${formatDuration(seasonSurvival)})로 ` +
              `시즌 전체보다 다소 흔들리고 있습니다.`;

          } else {
            trendTitle = "안정적";
            trendDesc =
              `최근 10판 평균 딜량 ${fmt(recentDamage, 1)} (시즌 ${fmt(seasonDamage, 1)}), ` +
              `평균 생존 ${formatDuration(recentSurvival)} (시즌 ${formatDuration(seasonSurvival)})로 ` +
              `시즌 전체와 비슷한 흐름입니다.`;
          }
        }

        // 3) 한 줄 평가
        let evalTitle = "안정 지향형";
        let evalDesc = "전체적으로 무난하고 안정적인 경기 흐름을 보이고 있습니다.";

        const shortSurvivalCount = matches.filter(m => Number(m.survivalTime ?? 0) < 300).length;
        const highKillLowWin = avgKills >= 2.0 && Number(o.winRate ?? 0) < 5;
        const lowDamageLongSurvival = avgDamage < 150 && avgSurvival >= 600;

        if (highKillLowWin) {
          evalTitle = "피지컬형";
          evalDesc = "교전 성과는 좋은 편이지만 후반 운영과 마무리 보완이 필요합니다.";
        } else if (shortSurvivalCount >= Math.ceil(matches.length * 0.4) && matches.length >= 10) {
          evalTitle = "대꼴형";
          evalDesc = "초반 탈락 비중이 높아 초반 교전 운영을 조금 더 안정적으로 가져갈 필요가 있습니다.";
        } else if (lowDamageLongSurvival) {
          evalTitle = "생존형";
          evalDesc = "생존 시간은 길지만 교전 기여도가 낮아 조금 더 적극적인 전투 전환이 필요합니다.";
        } else if (Number(o.winRate ?? 0) >= 10 && avgPlace <= 10) {
          evalTitle = "치킨 지향형";
          evalDesc = "순위 방어와 마무리 모두 안정적으로 가져가는 편입니다.";
        }

        return {
          styleTitle,
          styleDesc,
          trendTitle,
          trendDesc,
          evalTitle,
          evalDesc
        };
      }

      function renderInsightSection(summary) {
        const insight = buildInsightData(summary);

        return `
    <div class="section">
      <h2>인사이트</h2>
      <div class="insight-grid">
        <div class="insight-card">
          <div class="label">플레이 스타일</div>

        <div class="insight-card">

    </div>
  `;
      }

      function renderPlacementSection(summary) {
        const placements = summary.recentPlacements || [];
        const recentMatches = summary.recentMatches || [];
        const avgPlace = placements.length
          ? (placements.reduce((a, b) => a + b, 0) / placements.length)

        const firstCount = placements.filter(p => p === 1).length;
        const top10Count = placements.filter(p => p <= 10).length;

        return `
    <div class="section">

      <div class="placement-wrap">

          return `

                    <div class="tooltip-head">

                        <div class="value">${escapeHtml(createdAt)}</div>
                      </div>
                    </div>
                  </div>
                </div>
              `;
        }).join("")}
          </div>
        </div>

        <div class="card placement-chart">
          <div class="k">순위 추이</div>
          <canvas id="placementChart" height="140"></canvas>
        </div>
      </div>
    </div>
  `;
      }

      function buildFrequentTeammates(matches, myName) {
        const map = {};

        for (const m of matches || []) {
          const team = m.teamMembers || m.team || [];
          if (!Array.isArray(team)) continue;

          const matchMvpScore = calcMatchMvpScore(m);

          for (const name of team) {
            if (!name || name === myName) continue;

            if (!map[name]) {
              map[name] = {
                games: 0,
                wins: 0,
                kills: 0,
                damage: 0,
                survival: 0,
                mvpCount: 0
              };
            }

            map[name].games++;
            map[name].kills += Number(m.kills ?? 0);
            map[name].damage += Number(m.damage ?? 0);
            map[name].survival += Number(m.survivalTime ?? 0);

            const rank = Number(m.rank ?? 0);
            if (rank === 1) map[name].wins++;

            if (matchMvpScore >= 4.5) {
              map[name].mvpCount++;
            }
          }
        }

        return Object.entries(map)
          .map(([name, v]) => ({
            name,
            games: v.games,
            winRate: v.games ? (v.wins / v.games * 100) : 0,
            avgKills: v.games ? (v.kills / v.games) : 0,
            avgDamage: v.games ? (v.damage / v.games) : 0,
            avgSurvival: v.games ? (v.survival / v.games) : 0,
            mvpRate: v.games ? (v.mvpCount / v.games * 100) : 0
          }))
          .sort((a, b) => {
            if (b.games !== a.games) return b.games - a.games;
            return b.winRate - a.winRate;
          });
      }

      <div class="card"><div class="k">승률</div><div class="v">${escapeHtml(fmtPct(o.winRate ?? 0))}</div></div>
      <div class="card"><div class="k">TOP10 비율</div><div class="v">${escapeHtml(fmtPct(top10Rate, 1))}</div></div>
      <div class="card"><div class="k">K/D</div><div class="v">${escapeHtml(fmt(o.avgKills ?? 0))}</div></div>
      <div class="card"><div class="k">딜량</div><div class="v">${escapeHtml(fmt(o.avgDamage ?? 0))}</div></div>
      <div class="card"><div class="k">생존시간</div><div class="v">${escapeHtml(formatDuration(o.avgSurvival ?? 0))}</div></div>
    </div>
  `;

        const modeRows = modeEntries.map(([key, v]) => `
    <tr>
      <td class="nowrap"><b>${escapeHtml(key)}</b></td>
      <td>${escapeHtml(v.games ?? "-")}</td>
      <td>${escapeHtml(fmt(v.kd ?? 0, 2))}</td>

    </tr>
  `).join("");

        const modeTable = `
    <div class="section">
      <h2>모드별 통계 (시즌)</h2>
      ${modeRows ? `
        <table>
          <thead>
            <tr>
              <th>모드</th><th>게임</th><th>K/D</th><th>승률</th><th>Top10</th><th>평균 딜량</th><th>평균 생존</th>
            </tr>
          </thead>
          <tbody>${modeRows}</tbody>
        </table>
      ` : `<div class="empty">모드별 데이터 없음</div>`}
    </div>
  `;

        const modeChart = `
    <div class="section">
      <h2>모드별 그래프 (평균 딜량)</h2>
      <div class="card">
        <canvas id="seasonModeChart" height="130"></canvas>
      </div>
    </div>
  `;

        return cards + modeTable + modeChart;
      }

      function calcTop10RateFromByMode(byMode) {
        const entries = Object.values(byMode || {});
        let totalGames = 0;
        let weighted = 0;
        for (const v of entries) {
          const g = Number(v.games ?? 0);
          const r = Number(v.top10Rate ?? 0); // 퍼센트
          if (!g) continue;
          totalGames += g;
          weighted += r * g;
        }
        return totalGames ? (weighted / totalGames) : 0;
      }
      let seasonModeChartInstance = null;

      function renderSeasonModeChart(byMode) {
        const canvas = document.getElementById("seasonModeChart");
        if (!canvas) return;

        const entries = sortByModeOrder(Object.entries(byMode || {}))
          .map(([label, v]) => ({
            label,
            games: Number(v.games ?? 0),
            avgDamage: Number(v.avgDamage ?? 0),
            winRate: Number(v.winRate ?? 0),
            kd: Number(v.kd ?? 0),
          }));

        const labels = entries.map(x => x.label);
        const avgDamage = entries.map(x => x.avgDamage);

        if (seasonModeChartInstance) seasonModeChartInstance.destroy();

        seasonModeChartInstance = new Chart(canvas, {
          type: "bar",
          data: {
            labels,
            datasets: [
              { label: "평균 데미지", data: avgDamage }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              tooltip: {
                callbacks: {
                  afterBody: (ctx) => {
                    const i = ctx[0].dataIndex;
                    const x = entries[i];
                    return [
                      `게임수: ${x.games}`,
                      `K/D: ${fmt(x.kd, 2)}`,
                      `승률: ${fmtPct(x.winRate, 1)}`
                    ];
                  }
                }
              },
              legend: { display: false }
            },
            scales: {
              y: { beginAtZero: true }
            }
          }
        });
      }

      async function ensureDashboardRankedLoaded() {
        const plat = state.platform || "steam";
        if (state.dashboardRanked && state.dashboardRankedPlatform === plat) return;

        state.dashboardRanked = await fetchRankedBoth(state.playerName);
        state.dashboardRankedPlatform = plat;
      }

      function fmtTier(tier, subTier) {
        const t = (tier || "").trim();
        const s = (subTier || "").trim();
        if (!t) return "-";
        return s ? `${t} ${s}` : t;
      }

      function rankedStatCard(title, card) {
        const isError = !!card?.error;
        const unranked = !!card?.unranked;

        // 안내문
        const banner = (unranked || isError) ? `
    <div class="muted" style="margin:6px 0 10px; font-size:13px; color:${isError ? "#ff5d5d" : ""};">
      ${escapeHtml(card?.message || (unranked ? "이번 시즌 경쟁전 기록이 없습니다." : "경쟁전 조회 실패"))}
    </div>
  ` : "";

        // 백엔드가 이제 내려주는 값들
        const tier = card?.tier || "";
        const subTier = card?.subTier || "";
        const rp = Number(card?.rp ?? 0);

        const bestTier = card?.bestTier || "";
        const bestRp = Number(card?.bestRp ?? 0);

        const rounds = Number(card?.roundsPlayed ?? 0);
        const avgRank = Number(card?.avgRank ?? NaN);

        const top10Rate = Number(card?.top10Rate ?? NaN); // %
        const winRate = Number(card?.winRate ?? NaN);     // %

        const avgKill = Number(card?.avgKill ?? NaN);
        const avgDamage = Number(card?.avgDamage ?? NaN);

        // 표시 문자열
        const tierText = (unranked || isError) ? "-" : fmtTier(tier, subTier);
        const rpText = (unranked || isError) ? "-" : String(rp);

        const bestText = (unranked || isError) ? "-" : (
          (bestTier || bestRp) ? `${bestTier || "-"}${bestRp ? ` (${bestRp})` : ""}` : "-"
        );

        const roundsText = (unranked || isError) ? "-" : String(rounds);

        const avgRankText = (unranked || isError) ? "-" : (Number.isFinite(avgRank) ? fmt(avgRank, 1) : "-");
        const top10Text = (unranked || isError) ? "-" : (Number.isFinite(top10Rate) ? fmtPct(top10Rate, 1) : "-");
        const winText = (unranked || isError) ? "-" : (Number.isFinite(winRate) ? fmtPct(winRate, 1) : "-");
        const avgKillText = (unranked || isError) ? "-" : (Number.isFinite(avgKill) ? fmt(avgKill, 2) : "-");
        const avgDmgText = (unranked || isError) ? "-" : (Number.isFinite(avgDamage) ? fmt(avgDamage, 0) : "-");

        // ✅ 색상 규칙 (매치 탭(statCard) 기준으로 통일)
        // - 승률(1등 비율): 10% 파랑, 30% 빨강  (matchTab winRate)
        // - Top10 비율:     30% 파랑, 50% 빨강  (matchTab top10Rate)
        // - 평균킬:         1 파랑, 3 빨강      (matchTab kd)
        // - 평균딜:         150 파랑, 300 빨강  (matchTab avgDamage)
        const cWin = colorClass(winRate, 10, 30);
        const cTop10 = colorClass(top10Rate, 30, 50);
        const cAvgKill = colorClass(avgKill, 1, 3);
        const cAvgDmg = colorClass(avgDamage, 150, 300);

        // 평균등수는 낮을수록 좋음(여긴 matchTab에 없던 지표라 룰 유지)
        const cAvgRank = (() => {
          if (!Number.isFinite(avgRank)) return "";
          if (avgRank <= 5) return "v-red";
          if (avgRank <= 10) return "v-blue";
          return "";
        })();

        // 상단 요약: "a승 b탑" (✅ 비율이 아니라 횟수)
        // 백엔드에 wins/top10s가 없으면 비율*판수로 추정(반올림)
        const winsCount = (unranked || isError) ? 0 : (
          Number.isFinite(Number(card?.wins)) ? Number(card.wins)
            : Math.round(rounds * (Number(winRate || 0) / 100))
        );

        const top10Count = (unranked || isError) ? 0 : (
          Number.isFinite(Number(card?.top10s)) ? Number(card.top10s)
            : Math.round(rounds * (Number(top10Rate || 0) / 100))
        );

        const mini = (unranked || isError) ? "" : `
  <div class="ranked-mini">
    ${escapeHtml(String(winsCount))}승 · ${escapeHtml(String(top10Count))}탑
  </div>
`;

        return `
    <div class="ranked-card">
      <div class="ranked-head">
        <div class="ranked-title">${escapeHtml(title)}</div>
        ${mini}
      </div>

      ${banner}

      <div class="tier-row">
        <div class="tier-icon">
          ${(unranked || isError)
            ? "—"
            : `<img src="${escapeHtml(tierIconUrl(tier, subTier))}" alt="${escapeHtml(tierText)}" />`
          }
      </div>
        <div class="tier-main">
          <div class="tier-line">${escapeHtml(tierText)} <span class="muted">(${escapeHtml(rpText)})</span></div>
          <div class="tier-sub">최고티어: ${escapeHtml(bestText)}</div>
        </div>
      </div>

      <div class="rank-metrics">
        ${metricHtml("게임수", roundsText)}
        ${metricHtml("승률", winText, cWin)}
        ${metricHtml("Top10", top10Text, cTop10)}

        ${metricHtml("K/D", avgKillText, cAvgKill)}
        ${metricHtml("평균 딜량", avgDmgText, cAvgDmg)}
        ${metricHtml("평균 등수", avgRankText, cAvgRank)}
      </div>
    </div>
  `;
      }

      function renderDashboardRanked() {
        const ranked = state.dashboardRanked || { duo: null, squad: null };

        return `
    <div class="section">
      <div class="card" style="margin-bottom:16px;">
        <div class="stats-grid top" style="margin-bottom:0;">
          ${rankedStatCard("듀오", ranked?.duo)}
          ${rankedStatCard("스쿼드", ranked?.squad)}
        </div>
      </div>

      <div class="hint">
        - 현재 시즌 기준으로 제공됩니다.<br/>
        - 듀오/스쿼드 모두 기록이 없으면 “기록 없음”으로 표시됩니다.
      </div>
    </div>
  `;
      }

      /* === Compare page === */
      function renderCompareDashboard() {
        const mode = state.compare.mode;
        const target = state.compare.target || "";
        const recommendedUsers = getRecommendedCompareUsers(state.summary, state.playerName);
        const selectedNames = parseCompareTargets(target);

        const ph = (mode === "season")
          ? "비교할 닉네임 입력 (여러 명이면 쉼표로 구분: A,B,C)"
          : "같이한 경기 비교 대상 입력 (여러 명이면 쉼표로 구분: A,B,C)";

        let resultHtml = `<div class="empty">상대 닉네임 입력 후 비교를 눌러주세요.</div>`;

        if (state.compare.loading) {
          resultHtml = `<div class="empty">비교 데이터를 불러오는 중입니다...</div>`;
        } else if (state.compare.error) {
          resultHtml = `<div class="empty">${escapeHtml(state.compare.error)}</div>`;
        } else {
          if (mode === "season" && state.compare.season) {
            if (state.compare.season.type === "single" && state.compare.season.otherName === target) {
              const r = state.compare.season;
              resultHtml = renderSeasonCompare(r.mySeason, r.otherSeason, r.otherName);
            } else if (state.compare.season.type === "multi") {
              resultHtml = renderSeasonMultiCompare(state.compare.season);
            }
          }

          if (mode === "shared") {
            if (state.compare.shared && state.compare.shared.type === "single" && state.compare.shared.otherName === target) {
              const r = state.compare.shared;
              resultHtml = renderSharedCompare(r.myRecent, r.otherRecent, r.otherName);
            } else if (state.compare.party && state.compare.party.type === "multi") {
              resultHtml = renderPartyCompare(state.compare.party);
            }
          }
        }

        return `
    <div class="section">
      <div class="compare-mode-row">
        <div class="compare-mode-label">비교 방식</div>

        <div class="compare-mode-group">
          <button class="compare-mode-btn ${mode === "season" ? "active" : ""}"
                  onclick="switchCompareMode('season')">
            시즌 비교
          </button>

          <button class="compare-mode-btn ${mode === "shared" ? "active" : ""}"
                  onclick="switchCompareMode('shared')">
            같이한 경기 비교
          </button>
        </div>
      </div>

      <div style="display:flex; gap:12px; align-items:center; margin-top:14px; flex-wrap:wrap;">
        <div class="muted">내 닉네임</div>
        <div><b>${escapeHtml(state.playerName)}</b></div>

        <div class="muted">상대 닉네임</div>
        <input id="compareInput"
              value="${escapeHtml(target)}"
              placeholder="${escapeHtml(ph)}"
              style="padding:8px 10px; border-radius:10px; border:1px solid #333; background:#111; color:#fff; min-width:240px;">
        <button class="btn" onclick="runCompare()">비교</button>
      </div>

      ${recommendedUsers.length ? `
        <div style="margin-top:14px;">
          <div class="muted" style="margin-bottom:8px;">추천 유저 (최근 20판 기준 5판 이상 함께함)</div>
          <div style="display:flex; gap:8px; flex-wrap:wrap;">
            ${recommendedUsers.map(u => `
              <button class="btn compare-rec-btn ${selectedNames.includes(u.name) ? "active" : ""}"
                      type="button"
                      onclick="toggleCompareUser('${escapeHtml(u.name)}')">
                ${escapeHtml(u.name)} (${u.games}판)
              </button>
            `).join("")}
          </div>
        </div>
      ` : ""}

      <div id="compareResult" style="margin-top:18px;">
        ${resultHtml}
      </div>
    </div>
  `;
      }

      function toggleCompareUser(name) {
        const input = document.getElementById("compareInput");
        const currentRaw = (input?.value || state.compare.target || "").trim();

        const names = parseCompareTargets(currentRaw);
        const idx = names.indexOf(name);

        if (idx >= 0) {
          names.splice(idx, 1); // 이미 있으면 제거
        } else {
          names.push(name);     // 없으면 추가
        }

        const nextValue = names.join(", ");
        state.compare.target = nextValue;

        if (input) {
          input.value = nextValue;
        }

        renderCurrentTab();
      }

      function renderSeasonMultiCompare(data) {
        const rows = (data?.summaries || []).map(item => {
          const s = item?.season;
          const o = s?.overall || {};
          const top10Rate = calcTop10RateFromByMode(s?.byMode || {});

          return {
            name: item.name,
            games: Number(o.games ?? 0),
            winRate: Number(o.winRate ?? 0),
            top10Rate: Number(top10Rate ?? 0),
            avgKills: Number(o.avgKills ?? 0),
            avgDamage: Number(o.avgDamage ?? 0),
            avgSurvival: Number(o.avgSurvival ?? 0)
          };
        }).sort((a, b) => b.games - a.games);

        return `
    <div class="section">
      <h2>시즌 비교 (${rows.length}명)</h2>

      <table style="margin-top:12px;">
        <thead>
          <tr>
            <th>닉네임</th>
            <th>게임 수</th>
            <th>승률</th>
            <th>TOP10</th>
            <th>K/D</th>
            <th>평균 딜량</th>
            <th>평균 생존</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(r => `
            <tr>
              <td><b>${escapeHtml(r.name)}</b></td>
              <td>${escapeHtml(String(r.games))}</td>
              <td>${escapeHtml(fmtPct(r.winRate, 1))}</td>
              <td>${escapeHtml(fmtPct(r.top10Rate, 1))}</td>
              <td>${escapeHtml(fmt(r.avgKills, 1))}</td>
              <td>${escapeHtml(fmt(r.avgDamage, 1))}</td>
              <td>${escapeHtml(formatDuration(r.avgSurvival))}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    </div>
  `;
      }

      function parseCompareTargets(raw) {
        return (raw || "")
          .split(/[,\n]/)
          .map(s => s.trim())
          .filter(Boolean)
          .filter((v, i, a) => a.indexOf(v) === i);
      }

      async function runCompare() {
        const input = document.getElementById("compareInput");
        const raw = (input?.value || "").trim();
        state.compare.target = raw;
        state.compare.error = null;

        if (!raw) {
          state.compare.loading = false;
          state.compare.error = "비교할 닉네임을 입력해주세요.";
          renderCurrentTab();
          return;
        }

        const others = parseCompareTargets(raw);

        if (!others.length) {
          state.compare.loading = false;
          state.compare.error = "비교할 닉네임을 입력해주세요.";
          renderCurrentTab();
          return;
        }

        state.compare.loading = true;
        renderCurrentTab();

        try {
          if (state.compare.mode === "season") {
            if (others.length === 1) {
              const otherName = others[0];

              const mySeasonRes = await fetchSummary(state.playerName, { scope: "SEASON" });
              const seasonId = mySeasonRes?.season?.seasonId;
              const otherSeasonRes = await fetchSummary(otherName, { scope: "SEASON", seasonId });

              state.compare.season = {
                type: "single",
                otherName,
                mySeason: mySeasonRes?.season,
                otherSeason: otherSeasonRes?.season
              };

              state.compare.loading = false;
              state.compare.lastUpdatedAt = Date.now();
              renderCurrentTab();
              return;
            }

            const names = [state.playerName, ...others]
              .map(s => s.trim())
              .filter(Boolean)
              .filter((v, i, a) => a.indexOf(v) === i);

            const mySeasonRes = await fetchSummary(state.playerName, { scope: "SEASON" });
            const seasonId = mySeasonRes?.season?.seasonId;

            const summaries = await Promise.all(
              names.map(async (name) => {
                const res = await fetchSummary(name, { scope: "SEASON", seasonId });
                return {
                  name,
                  season: res?.season || null
                };
              })
            );

            state.compare.season = {
              type: "multi",
              names,
              summaries
            };

            state.compare.loading = false;
            state.compare.lastUpdatedAt = Date.now();
            renderCurrentTab();
            return;
          }

          if (state.compare.mode === "shared") {
            if (others.length === 1) {
              const otherName = others[0];

              const myRecent = state.summary && state.dashboardMode === "recent"
                ? state.summary
                : await fetchSummary(state.playerName, {
                  platform: state.platform,
                  scope: "RECENT",
                  period: state.period,
                  limit: COMPARE_LIMIT
                });

              const otherRecent = await fetchSummary(otherName, {
                platform: state.platform,
                scope: "RECENT",
                period: state.period,
                limit: COMPARE_LIMIT
              });

              state.compare.shared = {
                type: "single",
                otherName,
                myRecent,
                otherRecent
              };

              state.compare.loading = false;
              state.compare.lastUpdatedAt = Date.now();
              renderCurrentTab();
              return;
            }

            const names = [state.playerName, ...others]
              .map(s => s.trim())
              .filter(Boolean)
              .filter((v, i, a) => a.indexOf(v) === i);

            if (names.length < 2) {
              state.compare.loading = false;
              state.compare.error = "비교할 닉네임을 1명 이상 입력하세요.";
              renderCurrentTab();
              return;
            }

            const summaries = await Promise.all(
              names.map(n => fetchSummary(n, {
                scope: "RECENT",
                period: state.period,
                limit: COMPARE_LIMIT
              }))
            );

            const matchIds = intersectMatchIds(summaries);
            const idSet = new Set(matchIds);

            const perPlayer = summaries.map((s, idx) => {
              const n = names[idx];
              const matches = filterMatchesByIds(s?.recentMatches || [], idSet);
              return { name: n, matches, stats: aggregateStatsFromMatches(matches) };
            });

            state.compare.party = {
              type: "multi",
              names,
              matchCount: matchIds.length,
              perPlayer
            };

            state.compare.loading = false;
            state.compare.lastUpdatedAt = Date.now();
            renderCurrentTab();
            return;
          }

        } catch (e) {
          console.error(e);
          state.compare.loading = false;
          state.compare.error = extractErrorMessage(e) || "비교 중 오류가 발생했습니다.";
          renderCurrentTab();
        }
      }

      function renderSeasonCompare(mySeason, otherSeason, otherName) {
        if (!mySeason || !otherSeason) {
          return `<div class="empty">시즌 데이터가 없습니다. (상대가 시즌 데이터가 없을 수 있어요)</div>`;
        }

        const m = mySeason.overall || {};
        const o = otherSeason.overall || {};

        const myTop10 = calcTop10RateFromByMode(mySeason.byMode || {});
        const otherTop10 = calcTop10RateFromByMode(otherSeason.byMode || {});

        return `
    <div class="grid" style="margin-top:10px;">
      ${compareCard(
          "게임 수",
          { value: (m.games ?? 0), display: String(m.games ?? 0) },
          { value: (o.games ?? 0), display: String(o.games ?? 0) },
          otherName
        )}

      ${compareCard(
          "승률",
          { value: (m.winRate ?? 0), display: fmtPct(m.winRate ?? 0, 1) },
          { value: (o.winRate ?? 0), display: fmtPct(o.winRate ?? 0, 1) },
          otherName
        )}

      ${compareCard(
          "TOP10 비율(%)",
          { value: myTop10, display: fmtPct(myTop10, 1) },
          { value: otherTop10, display: fmtPct(otherTop10, 1) },
          otherName
        )}

      ${compareCard(
          "K/D(평균 킬)",
          { value: (m.avgKills ?? 0), display: fmt(m.avgKills ?? 0, 1) },
          { value: (o.avgKills ?? 0), display: fmt(o.avgKills ?? 0, 1) },
          otherName
        )}

      ${compareCard(
          "평균 딜량",
          { value: (m.avgDamage ?? 0), display: fmt(m.avgDamage ?? 0, 1) },
          { value: (o.avgDamage ?? 0), display: fmt(o.avgDamage ?? 0, 1) },
          otherName
        )}

      ${compareCard(
          "평균 생존시간",
          { value: (m.avgSurvival ?? 0), display: formatDuration(m.avgSurvival ?? 0) },
          { value: (o.avgSurvival ?? 0), display: formatDuration(o.avgSurvival ?? 0) },
          otherName
        )}
    </div>
  `;
      }

      function parsePartyInput(raw) {
        return (raw || "")
          .split(/[,\n]/)
          .map(s => s.trim())
          .filter(Boolean);
      }

      function intersectMatchIds(allRecentSummaries) {
        const sets = allRecentSummaries.map(s => new Set((s?.recentMatches || []).map(m => m.matchId).filter(Boolean)));
        if (!sets.length) return [];

        let inter = sets[0];
        for (let i = 1; i < sets.length; i++) {
          const next = new Set();
          for (const id of inter) if (sets[i].has(id)) next.add(id);
          inter = next;
          if (inter.size === 0) break;
        }
        return Array.from(inter);
      }

      function filterMatchesByIds(recentMatches, idSet) {
        return (recentMatches || []).filter(m => m?.matchId && idSet.has(m.matchId));
      }

      function compareCard(label, my, other, otherName, opt = {}) {
        // my/other: { value: number, display: string }
        // opt: { higherIsBetter: true/false }
        const higherIsBetter = opt.higherIsBetter !== false; // default true

        const a = Number(my?.value);
        const b = Number(other?.value);

        let myCls = "compare-tie", otherCls = "compare-tie";
        let myMark = "=", otherMark = "=";

        if (Number.isFinite(a) && Number.isFinite(b) && a !== b) {
          const myBetter = higherIsBetter ? (a > b) : (a < b);
          myCls = myBetter ? "compare-win" : "compare-lose";
          otherCls = myBetter ? "compare-lose" : "compare-win";
          myMark = myBetter ? "▲" : "▼";
          otherMark = myBetter ? "▼" : "▲";
        }

        const myDisplay = my?.display ?? String(my?.value ?? "-");
        const otherDisplay = other?.display ?? String(other?.value ?? "-");

        return `
    <div class="card">
      <div class="k">${escapeHtml(label)}</div>

      <div class="compare-row">
        <div class="compare-side ${myCls}">
          <div class="muted" style="font-size:12px;">
            ${escapeHtml(state.playerName)}
            <span class="compare-badge">${myMark}</span>
          </div>
          <div class="v">${escapeHtml(myDisplay)}</div>
        </div>

        <div class="compare-side right ${otherCls}">
          <div class="muted" style="font-size:12px;">
            <span class="compare-badge">${otherMark}</span>
            ${escapeHtml(otherName)}
          </div>
          <div class="v">${escapeHtml(otherDisplay)}</div>
        </div>
      </div>
    </div>
  `;
      }

      function renderSharedCompare(myRecent, otherRecent, otherName) {
        const pairs = buildSharedPairs(
          myRecent?.recentMatches || [],
          otherRecent?.recentMatches || []
        );

        if (!pairs.length) {
          return `<div class="empty">같이한 경기가 없습니다.</div>`;
        }

        const myStats = aggregateStatsFromMatches(pairs.map(p => p.my));
        const otherStats = aggregateStatsFromMatches(pairs.map(p => p.other));

        return `
    <div class="section">
      <h2>같이한 경기 비교 (공통 ${pairs.length}판)</h2>

      <div class="grid">

        ${compareCard(
          "평균 킬",
          { value: myStats.avgKills, display: fmt(myStats.avgKills, 1) },
          { value: otherStats.avgKills, display: fmt(otherStats.avgKills, 1) },
          otherName
        )}

        ${compareCard(
          "평균 딜량",
          { value: myStats.avgDamage, display: fmt(myStats.avgDamage, 1) },
          { value: otherStats.avgDamage, display: fmt(otherStats.avgDamage, 1) },
          otherName
        )}

        ${compareCard(
          "헤드샷 비율",
          { value: myStats.headshotRate, display: fmtPct(myStats.headshotRate, 1) },
          { value: otherStats.headshotRate, display: fmtPct(otherStats.headshotRate, 1) },
          otherName
        )}

        ${compareCard(
          "평균 어시스트",
          { value: myStats.avgAssists, display: fmt(myStats.avgAssists, 1) },
          { value: otherStats.avgAssists, display: fmt(otherStats.avgAssists, 1) },
          otherName
        )}

        ${compareCard(
          "최대 킬",
          { value: myStats.maxKills, display: myStats.maxKills },
          { value: otherStats.maxKills, display: otherStats.maxKills },
          otherName
        )}

        ${compareCard(
          "최장 거리 킬",
          { value: myStats.longestKill, display: fmt(myStats.longestKill, 1) + "m" },
          { value: otherStats.longestKill, display: fmt(otherStats.longestKill, 1) + "m" },
          otherName
        )}

        ${compareCard(
          "평균 생존시간",
          { value: myStats.avgSurvival, display: formatDuration(myStats.avgSurvival) },
          { value: otherStats.avgSurvival, display: formatDuration(otherStats.avgSurvival) },
          otherName
        )}

      </div>
    </div>
  `;
      }

      function buildSharedPairs(myRecentMatches, otherRecentMatches) {
        const myMap = new Map();
        for (const m of (myRecentMatches || [])) {
          if (m?.matchId) myMap.set(m.matchId, m);
        }

        const pairs = [];
        for (const om of (otherRecentMatches || [])) {
          if (!om?.matchId) continue;
          const mm = myMap.get(om.matchId);
          if (mm) pairs.push({ my: mm, other: om });
        }
        return pairs;
      }

      function aggregateStatsFromMatches(matches) {
        const n = (matches || []).length;

        let wins = 0, top10 = 0;
        let kills = 0, dmg = 0, surv = 0, rankSum = 0, rankCnt = 0;

        let assists = 0;
        let headshots = 0;
        let maxKills = 0;
        let longestKill = 0;

        for (const m of (matches || [])) {
          const r = Number(m.rank ?? 0);
          if (r === 1) wins++;
          if (r > 0 && r <= 10) top10++;

          const k = Number(m.kills ?? 0);
          kills += k;
          dmg += Number(m.damage ?? 0);
          surv += Number(m.survivalTime ?? 0);
          assists += Number(m.assists ?? 0);
          headshots += Number(m.headshotKills ?? 0);

          if (r > 0) { rankSum += r; rankCnt++; }
          if (k > maxKills) maxKills = k;

          const lk = Number(m.longestKill ?? 0);
          if (lk > longestKill) longestKill = lk;
        }

        const headshotRate = kills ? (headshots / kills) * 100 : 0;

        return {
          games: n,
          winRate: n ? (wins / n) * 100 : 0,
          top10Rate: n ? (top10 / n) * 100 : 0,
          avgKills: n ? kills / n : 0,
          avgDamage: n ? dmg / n : 0,
          avgSurvival: n ? surv / n : 0,
          avgPlace: rankCnt ? rankSum / rankCnt : 0,

          avgAssists: n ? assists / n : 0,
          headshotRate,
          maxKills,
          longestKill
        };
      }

      function calcMvpScore(s) {
        return (s.avgKills * 2)
          + (s.avgAssists)
          + (s.avgDamage / 200)
          + (s.headshotRate / 10)
          + (s.longestKill / 100);
      }

      function renderPartyCompare(party) {

        const formula = "MVP = (평균킬×2) + 평균어시 + (평균량/200) + (헤드샷비율/10) + (최장거리킬/100)";

        // ✅ 점수 계산 + 내림차순 정렬
        const rows = (perPlayer || [])
          .map(p => {
            const s = p.stats || {};
            const score = calcMvpScore(s);
            return { ...p, score };
          })
          .sort((a, b) => (b.score ?? 0) - (a.score ?? 0)); // 🔥 여기

        const best = rows[0];

        return `
    <div class="section">
      <h2>파티 비교 (공통 ${matchCount}판)</h2>
      <div class="muted" style="margin-top:6px;">${escapeHtml(formula)}</div>

      <table style="margin-top:12px;">

        </thead>
        <tbody>
          ${rows.map(r => {

          return `
              <tr class="${isMvp ? "mvp-row" : ""}">
                <td><b>${escapeHtml(r.name)}</b> ${isMvp ? "👑" : ""}</td>
                <td>${escapeHtml(fmt(r.score, 2))}</td>

                <td>${escapeHtml(s.maxKills ?? 0)}</td>
                <td>${escapeHtml(fmt(s.longestKill ?? 0, 1))}m</td>
                <td>${escapeHtml(formatDuration(s.avgSurvival ?? 0))}</td>
              </tr>
            `;
        }).join("")}
        </tbody>
      </table>
    </div>
  `;
      }

            function applyMapTransform() {
        const zoomLayer = document.getElementById("mapZoomLayer");
        const stage = document.getElementById("mapStage");
        if (!zoomLayer || !stage) return;

        const z = state.mapExplorer.zoom || 1;
        const x = state.mapExplorer.offsetX || 0;
        const y = state.mapExplorer.offsetY || 0;

        zoomLayer.style.transform = `translate(${x}px, ${y}px) scale(${z})`;
      }

      function clampMapOffset() {
        const stage = document.getElementById("mapStage");
        if (!stage) return;

        const rect = stage.getBoundingClientRect();
        const z = state.mapExplorer.zoom || 1;

        if (z <= 1) {
          state.mapExplorer.offsetX = 0;
          state.mapExplorer.offsetY = 0;
          return;
        }

        const extraW = rect.width * (z - 1);
        const extraH = rect.height * (z - 1);

        const minX = -extraW;
        const maxX = 0;
        const minY = -extraH;
        const maxY = 0;

        state.mapExplorer.offsetX = Math.min(maxX, Math.max(minX, state.mapExplorer.offsetX));
        state.mapExplorer.offsetY = Math.min(maxY, Math.max(minY, state.mapExplorer.offsetY));
      }

      function zoomAt(clientX, clientY, delta) {
        const stage = document.getElementById("mapStage");
        if (!stage) return;

        const rect = stage.getBoundingClientRect();
        const oldZoom = state.mapExplorer.zoom || 1;
        const minZoom = state.mapExplorer.minZoom || 1;
        const maxZoom = state.mapExplorer.maxZoom || 3.5;

        const zoomFactor = delta > 0 ? 1.12 : 0.9;
        const newZoom = Math.min(maxZoom, Math.max(minZoom, oldZoom * zoomFactor));

        if (newZoom === oldZoom) return;

        const px = clientX - rect.left;
        const py = clientY - rect.top;

        const worldX = (px - state.mapExplorer.offsetX) / oldZoom;
        const worldY = (py - state.mapExplorer.offsetY) / oldZoom;

        state.mapExplorer.zoom = newZoom;
        state.mapExplorer.offsetX = px - worldX * newZoom;
        state.mapExplorer.offsetY = py - worldY * newZoom;

        clampMapOffset();
        applyMapTransform();
      }

      function resetMapZoom() {
        state.mapExplorer.zoom = 1;
        state.mapExplorer.offsetX = 0;
        state.mapExplorer.offsetY = 0;
        applyMapTransform();
      }

      function bindMapZoom() {
        const stage = document.getElementById("mapStage");
        if (!stage) return;

        let dragging = false;
        let startX = 0;
        let startY = 0;
        let baseX = 0;
        let baseY = 0;

        stage.addEventListener("wheel", (e) => {
          e.preventDefault();
          zoomAt(e.clientX, e.clientY, -e.deltaY);
        }, { passive: false });

        stage.addEventListener("mousedown", (e) => {
          if ((state.mapExplorer.zoom || 1) <= 1) return;
          dragging = true;
          stage.classList.add("dragging");
          startX = e.clientX;
          startY = e.clientY;
          baseX = state.mapExplorer.offsetX || 0;
          baseY = state.mapExplorer.offsetY || 0;
        });

        window.addEventListener("mousemove", (e) => {
          if (!dragging) return;
          state.mapExplorer.offsetX = baseX + (e.clientX - startX);
          state.mapExplorer.offsetY = baseY + (e.clientY - startY);
          clampMapOffset();
          applyMapTransform();
        });

        window.addEventListener("mouseup", () => {
          dragging = false;
          stage.classList.remove("dragging");
        });

        stage.addEventListener("dblclick", () => {
          resetMapZoom();
        });
      }

        // ✅ 파티 닉네임 클릭 → 해당 유저로 검색
        const plink = e.target.closest(".party-link");
        if (plink) {
          e.preventDefault();
          e.stopPropagation();
          const nextName = plink.dataset.player;
          await switchPlayer(nextName);
          return;
        }

        // ✅ 매치탭 기간 선택
        const pbtn = e.target.closest("[data-matchperiod]");
        if (pbtn) {
          state.matchTab.period = pbtn.dataset.matchperiod;
          state.matchTab.data = null;          // 캐시 무효화
          state.matchTab.page = 1;
          state.matchTab.pageGroup = 0;
          await renderCurrentTab();
          return;
        }

        // ✅ 매치탭 새로고침
        // ✅ 전적갱신
        if (e.target.closest("#btnRefreshRecords")) {
          // 프론트 캐시 무효화 후 재조회
          state.matchTab.data = null;
          state.matchTab.dataPeriod = null;
          state.matchTab.page = 1;
          state.matchTab.pageGroup = 0;

          state.matchTab.ranked = null;
          state.matchTab.rankedPlatform = null;

          // 대시보드 요약도 최신화(원하면 이 줄 빼도 됨)
          state.summary = null;
          await loadSummaryForCurrentPlayer();

          await renderCurrentTab();
          return;
        }

        // ✅ 매치탭 페이지 이동
        const pageBtn = e.target.closest("[data-matchpage]");
        if (pageBtn) {
          state.matchTab.page = Number(pageBtn.dataset.matchpage);
          await renderCurrentTab();
          return;
        }

        // ✅ 매치탭 페이지 그룹 이동 (» / «)
        const grpBtn = e.target.closest("[data-matchpagegroup]");
        if (grpBtn) {
          const dir = grpBtn.dataset.matchpagegroup;
          if (dir === "next") state.matchTab.pageGroup += 1;
          else state.matchTab.pageGroup -= 1;

          const groupSize = 5;
          state.matchTab.page = state.matchTab.pageGroup * groupSize + 1;
          await renderCurrentTab();
          return;
        }

        const lbBtn = e.target.closest("#lbSearchBtn");
        if (lbBtn) {
          const input = document.getElementById("lbQueryInput");
          state.lbQuery = (input?.value || "").trim();
          await renderCurrentTab();
          return;
        }

        // ✅ 순위표 플랫폼 토글 (STEAM/KAKAO)
        const lbPlatBtn = e.target.closest("[data-lbplatform]");
        if (lbPlatBtn) {
          state.lbPlatform = lbPlatBtn.dataset.lbplatform || "steam";
          // 플랫폼 바뀌면 필터는 유지해도 되고, 초기화해도 됨(원하면 아래 주석 해제)
          // state.lbQuery = "";
          await renderCurrentTab();
          return;
        }

        const mapCard = e.target.closest("[data-mapselect]");
        if (mapCard) {
          const nextMap = mapCard.dataset.mapselect || "erangel";
          state.mapExplorer.selectedMap = nextMap;
          state.mapExplorer.selectedDetail = null;

          state.mapExplorer.zoom = 1;
          state.mapExplorer.offsetX = 0;
          state.mapExplorer.offsetY = 0;

          if (!SECRET_ROOM_ENABLED_MAPS.has(nextMap)) {
            state.mapExplorer.showSecretRooms = false;
          }

          await renderCurrentTab();
          return;
        }

        const markerEl = e.target.closest("[data-marker-type]");
        if (markerEl) {
          const markerType = markerEl.dataset.markerType;
          const markerIndex = Number(markerEl.dataset.markerIndex || -1);
          const mapKey = state.mapExplorer.selectedMap;
          const layerData = MAP_LAYERS[mapKey] || {};

          let item = null;
          if (markerType === "secret") {
            item = (layerData.secretRooms || [])[markerIndex] || null;
          } else if (markerType === "lab") {
            item = (layerData.labs || [])[markerIndex] || null;
          } else if (markerType === "vehicle") {
            item = (layerData.vehicleSpawns || [])[markerIndex] || null;
          }

          if (item) {
            state.mapExplorer.selectedDetail = item;
            await renderCurrentTab();
          }
          return;
        }
      });

      view.addEventListener("change", async (e) => {
        const lbPlatSel = e.target.closest("#lbPlatformSelect");
        if (lbPlatSel) {
          state.lbPlatform = lbPlatSel.value || "steam";
          await renderCurrentTab();
          return;
        }

        const sel = e.target.closest("#rankedModeSelect");
        if (sel) {
          state.rankedMode = sel.value || "squad-fpp";
          await renderCurrentTab();
        }

        const layerToggle = e.target.closest("[data-maplayer]");
        if (layerToggle) {
          const key = layerToggle.dataset.maplayer;
          if (key === "secretRooms") {
            state.mapExplorer.showSecretRooms = layerToggle.checked;
          }
          if (key === "vehicleSpawns") {
            state.mapExplorer.showVehicleSpawns = layerToggle.checked;
          }
          if (key === "labs") {
            state.mapExplorer.showLabs = layerToggle.checked;
          }
          await renderCurrentTab();
          return;
        }

        if (key === "labs") {
          state.mapExplorer.showLabs = layerToggle.checked;
        }
      });
