name: Keep Render Awake

on:
  schedule:
    - cron: "3,13,23,33,43,53 * * * *"
    - cron: "8,18,28,38,48,58 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Render Health Endpoint
        run: |
          for i in 1 2 3; do
            echo "Attempt $i"
            curl -fLsS \
              --connect-timeout 20 \
              --max-time 120 \
              https://bglog.onrender.com/pubg/health && exit 0
            sleep 20
          done
          exit 1
